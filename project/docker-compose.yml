version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6.0
    container_name: recommendation_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recommendation_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation_api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - DEBUG=True
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      sh -c "python models/train.py --dummy && 
             python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"
    networks:
      - recommendation_network
    restart: unless-stopped

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation_streamlit
    ports:
      - "8501:8501"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py
    networks:
      - recommendation_network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  recommendation_network:
    driver: bridge
